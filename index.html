<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <!-- Viewport iOS — cover pour utiliser tout l'écran + encoche -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

  <!-- PWA général -->
  <meta name="theme-color" content="#185FA5" />
  <meta name="description" content="MediSafe Aidant — gestion sécurisée des médicaments" />

  <!-- iOS PWA — obligatoire pour "Ajouter à l'écran d'accueil" -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MediSafe" />

  <!-- Icônes iOS -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png" />

  <!-- Favicon + manifest -->
  <link rel="icon" href="icons/favicon.ico" />
  <link rel="manifest" href="manifest.json" />

  <title>MediSafe Aidant</title>

  <!-- Tabler Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

  <!-- CSS — ordre important -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/main.css" />

  <style>
    /* Éviter le zoom automatique sur les inputs iOS */
    input, select, textarea { font-size: 16px !important; }
    /* Désactiver le callout sur les éléments tapables */
    button, a { -webkit-touch-callout: none; }
    /* Smooth scroll natif iOS */
    * { -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>

  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0d1f35">
      <div style="text-align:center">
        <div style="width:60px;height:60px;border-radius:16px;background:#185FA5;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
          <i class="ti ti-shield-heart" style="font-size:28px;color:#fff"></i>
        </div>
        <p style="color:rgba(255,255,255,.5);font-size:13px">Chargement...</p>
      </div>
    </div>
  </div>

  <script src="js/services/auth.js"></script>
  <script src="js/services/patients.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
